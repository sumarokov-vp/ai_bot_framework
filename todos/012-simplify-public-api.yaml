title: "Упрощение публичного API: убрать внутренние детали под капот"
status: done
created_at: 07.03.2026
completed_at: 07.03.2026

description: |
  Сейчас клиент вынужден создавать и управлять внутренними объектами фреймворка:
  PostgresMemoryStore, PostgresSessionStore, AnthropicProvider, ToolRegistry.
  Всё это должно быть скрыто внутри AIApplication.

solution: |
  AIApplication теперь поддерживает упрощённый API:
  - api_key/model вместо provider (AnthropicProvider создаётся автоматически)
  - tools=[...] вместо tool_registry (ToolRegistry создаётся автоматически)
  - database_url автоматически создаёт PostgresMemoryStore и PostgresSessionStore в open()
  - memory по умолчанию InMemoryStore (не нужно передавать)
  - open()/close() lifecycle + context manager (__enter__/__exit__)
  - update_system_prompt() для смены промпта на лету
  - Все advanced override параметры (provider, memory, tool_registry, session_store) остаются

